name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Mengambil Kode
        uses: actions/checkout@v4

      - name: ⚙️ Menyiapkan Node.js (Dengan Cache NPM)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Mesin sudah di-upgrade ke versi 20
          cache: 'npm'

      - name: ☕ Menyiapkan Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ⚡ Menyiapkan Cache Gradle (Boster Kecepatan Android)
        uses: gradle/actions/setup-gradle@v3

      - name: 📦 Menginstal Dependencies
        run: npm install

      - name: 🏗️ Prebuild Expo ke Android Asli
        run: npx expo prebuild --platform android

      - name: 🚀 Merakit APK (Mode Ngebut)
        working-directory: android
        run: ./gradlew assembleRelease --parallel -Porg.gradle.configuration-cache=true

      - name: 📤 Mengunggah APK
        uses: actions/upload-artifact@v4
        with:
          name: TVKu-App-Release
          path: android/app/build/outputs/apk/release/app-release.apk      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 6. Cache Gradle untuk mempercepat build berikutnya
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Build APK (Debug & Release)
      # Catatan: Untuk Release APK yang signed, Anda perlu konfigurasi signing tambahan.
      # Ini akan menghasilkan APK unsigned atau debug-signed.
      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug assembleRelease

      # 8. Upload APK Debug sebagai Artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: react-native-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # 9. Upload APK Release sebagai Artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: react-native-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
