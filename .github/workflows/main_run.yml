name: Build Android APK (Vite + Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install ALL Dependencies (including Capacitor)
        run: |
          npm ci
          # Pastikan Capacitor CLI terinstal — jika belum ada di package.json, tambahkan
          if ! npm list @capacitor/cli > /dev/null 2>&1; then
            echo "⚠️ @capacitor/cli not found, installing..."
            npm install --save-dev @capacitor/cli @capacitor/core @capacitor/android
          fi

      - name: 🏗️ Build Web App (Vite)
        run: npm run build

      - name: 🔧 Initialize Capacitor (if config missing)
        run: |
          if [ ! -f capacitor.config.json ]; then
            echo "🛠️ Initializing Capacitor..."
            npx cap init gravity com.gravity.iptv --web-dir dist
          fi

      - name: ➕ Add Android Platform (if folder missing)
        run: |
          if [ ! -d android ]; then
            echo "📱 Adding Android platform..."
            npx cap add android
          fi

      - name: 🔄 Sync Web Assets to Android
        run: npx cap copy android

      - name:  Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --parallel

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gravity-app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
