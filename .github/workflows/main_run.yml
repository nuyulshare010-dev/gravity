name: Build Android APK (Vite + Capacitor)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Web App (Vite)
        run: npm run build
        # Ini akan membuat folder 'dist/' berisi file HTML/CSS/JS

      - name: 🔄 Sync Web Assets to Android
        run: npx cap copy android
        # Ini menyalin isi folder 'dist/' ke dalam proyek Android

      - name: 🚀 Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --parallel

      - name:  Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gravity-app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
