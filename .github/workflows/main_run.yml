name: Build Android APK (Vite + Capacitor)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚡ Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 📦 Install dependencies (termasuk Capacitor)
        run: |
          npm ci
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: 🏗️ Build Vite (web)
        run: npm run build

      - name: 📄 Buat capacitor.config.json (otomatis)
        run: |
          echo '{
            "appId": "com.example.gravity",
            "appName": "Gravity",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }' > capacitor.config.json

      - name: 📱 Setup proyek Android (hanya jika belum ada)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 🔧 Atasi konflik Kotlin (exclude duplikat)
        run: |
          if [ -f android/app/build.gradle ]; then
            if ! grep -q "exclude group: 'org.jetbrains.kotlin'" android/app/build.gradle; then
              sed -i '/android {/a \
              configurations {\
                  all {\
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\
                      exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\
                  }\
              }' android/app/build.gradle
            fi
          fi

      - name: 🔄 Sinkronisasi Capacitor
        run: npx cap sync android

      - name: 🚀 Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gravity-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
