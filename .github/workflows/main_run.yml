name: Build Android APK (Expo)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4  # DIPERBAIKI: v4
        with:
          distribution: 'temurin'     # Lebih stabil dari 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Prebuild Expo to Android
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Setup Signing Config (Debug for now)
        # Sementara, kita build DEBUG karena RELEASE butuh secrets
        # Jika ingin RELEASE, lihat catatan di bawah
        run: echo "Kita akan build debug dulu untuk testing"

      - name: 🚀 Build Debug APK (Aman & Cepat)
        working-directory: ./android
        run: ./gradlew assembleDebug --parallel

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TVKu-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
